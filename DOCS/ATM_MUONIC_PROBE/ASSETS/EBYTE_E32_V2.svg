<?xml version="1.0" encoding="UTF-8"?>
<svg
    version="1.1"
    xmlns="http://www.w3.org/2000/svg"
    width="100"
    height="220"
    viewBox="0 0 100 220">

    <rect width="100" height="170" x="0" y="50" fill="#09843A"/>

    <!-- Top pins -->
    <circle id="p1" r="3" cx="15" cy="62" fill="#FFFFFF" class="connection_point"/>
    <circle id="p2" r="3" cx="27" cy="62" fill="#FFFFFF" class="connection_point"/>
    <circle id="p3" r="3" cx="39" cy="62" fill="#FFFFFF" class="connection_point"/>

    <!-- Antenna -->
    <rect width="30" height="40" x="60" y="0" fill="#98906E"/>
    <rect width="36" height="10" x="57" y="40" fill="#98906E"/>

    <!-- Connector -->
    <rect width="7" height="15" x="57" y="50" fill="#98906E"/>
    <rect width="7" height="15" x="71" y="50" fill="#98906E"/>
    <rect width="7" height="15" x="86" y="50" fill="#98906E"/>

    <!-- Shield -->
    <rect width="80" height="130" x="9" y="75" fill="#B7B6B7"/>

    <!-- Labels -->
    <text x="10" y="90" font-size="5" fill="#FFFFFF">
        E32-TTL-100 12V
    </text>

    <!-- Bottom pins -->
    <circle id="p4" r="3" cx="25" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p5" r="3" cx="33" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p6" r="3" cx="41" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p7" r="3" cx="49" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p8" r="3" cx="57" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p9" r="3" cx="65" cy="212" fill="#FFFFFF" class="connection_point"/>
    <circle id="p10" r="3" cx="73" cy="212" fill="#FFFFFF" class="connection_point"/>

</svg>